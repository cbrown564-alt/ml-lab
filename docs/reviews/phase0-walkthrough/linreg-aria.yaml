  - heading "A line is a claim" [level=2]
  - paragraph:
    - button "Listen0:35"
  - paragraph: "Every straight line through the data is a little theory: every unit of x is worth this much y, starting from here. Two numbers — slope and intercept — and the theory is fully specified. The plot above shows the only such theory the data cannot improve on."
  - paragraph: "But “cannot improve on” needs a judge. That judge is the set of dashed segments you toggled: the residuals, one per point, each measuring how far the theory missed reality — vertically, because x is taken as given and only the prediction of y is on trial."
  - heading "Why squared error" [level=2]
  - paragraph:
    - button "Listen0:47"
  - paragraph: "The line you saw minimizes the sum of the residuals squared. Squaring does two jobs at once. It makes misses count regardless of direction — overshooting by 3 is exactly as bad as undershooting by 3. And it makes big misses count disproportionately: one residual of 10 outweighs ten residuals of 1, a hundred to ten."
  - paragraph: That second property is a personality trait, and you met its dark side in the outlier scenario. A single rogue point carries enough squared error to bend the line away from twenty-eight well-behaved ones. Squared error isn't wrong to do this — it is doing exactly what it was told. Whether that's what you wanted is a different question, and it's why other loss functions exist.
  - heading "What “best” buys you" [level=2]
  - paragraph:
    - button "Listen0:28"
  - paragraph: "Choosing squared error has a famous reward: the best line can be computed directly, with a formula, no search required. Drag a point and the line snaps instantly to the new optimum — that snap is the formula at work. Most models you'll meet after this one offer no such formula; their best parameters must be searched for, step by step, downhill. That search has its own exhibit, and this line is where it starts."
  - heading "Check your understanding" [level=2]
  - list:
    - listitem:
      - paragraph: The line of best fit you dragged points around is “best” in exactly what sense?
      - button "It passes through as many points as possible"
      - button "It makes the sum of squared vertical distances to the points as small as possible"
      - button "It minimizes the perpendicular distance from each point to the line"
    - listitem:
      - paragraph: In the outlier scenario, one rogue point dragged the whole line off the trend. What gives a single point that much power?
      - button "Squaring makes a big error count far more than several small ones"
      - button "Points further from the line are weighted by the algorithm"
      - button "Outliers change the average of x, which moves the line"
    - listitem:
      - paragraph: A point has a residual of −3. What does that tell you?
      - button "The line predicts 3 units higher than the point's actual value"
      - button "The point is 3 units to the left of the line"
      - button "The point is an outlier and should be removed"
    - listitem:
      - paragraph: Predict, then verify
      - paragraph: Load “The tyranny of the outlier” and switch the error view to Squares. Find the biggest penalty square.
      - paragraph: If that rogue point wanders twice as far from the line, the area of its penalty square will be…
      - button "About twice as big — twice the miss, twice the penalty"
      - button "About four times as big — the penalty is the square of the miss"
      - button "About the same — the line refits to absorb the move"
    - listitem:
      - paragraph: Lab task
      - paragraph: "Make the tyranny stop: on “The tyranny of the outlier,” deal with both rogue points — drag them back to the trend, or double-click them out — until the MSE drops below 2."
      - status: Waiting on the experiment above — this one is completed with your hands, not a click here.
  - heading "Field notes" [level=2]
  - list:
    - listitem: In industry, linear regression is the baseline that fancier models must beat to justify their complexity — and embarrassingly often, they don't beat it by much.
    - listitem: "In science and economics, the slope is the headline: “an extra year of schooling is associated with X% higher earnings” is a regression coefficient speaking."
    - listitem: "Its failure mode travels too: the outlier sensitivity you just saw is why analysts inspect residual plots before trusting any fitted line."
