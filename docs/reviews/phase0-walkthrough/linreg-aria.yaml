  - heading "Linear Regression" [level=1]
  - text: seen
  - paragraph: "The straight line that started it all. Before the math, get your hands on it: every point below is data the line must answer to, and the line you see is always the best one available — for a very particular meaning of “best.”"
  - paragraph:
    - button "Listen0:45"
  - paragraph: "In 1885, Francis Galton plotted the heights of nearly a thousand adult children against the heights of their parents and noticed something odd: tall parents had tall children, but not quite as tall; short parents had short children, but not quite as short. To describe how strongly one number pulls on another, he drew a line through the cloud — and accidentally founded the most-used statistical tool of the next century."
  - paragraph: The question his line answers is everywhere once you see it. How much does another bedroom add to a flat's price? How much does an extra hour of revision move an exam score? One number, predicted from another, with a straight line as the claim. The experiment below puts that claim in your hands.
  - button "Meet the line of best fit"
  - button "⚠ The tyranny of the outlier"
  - button "Paint your own data"
  - button "Reset"
  - paragraph: "Two rogue points have wandered in. Drag one of them further out and watch how violently the line chases it. Squared error doesn't just notice big mistakes — it obsesses over them. Predict first: how far must one point stray to drag the line completely off the trend?"
